<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: #1f2937;
        background: #fffdf8;
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        margin-bottom: 12px;
        color: #111827;
      }
      .section { margin-bottom: 12px; }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #6b7280;
        margin-bottom: 4px;
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        outline: none;
      }
      input:focus { border-color: #9a6b2f; }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        color: #fff;
        background: #9a6b2f;
      }
      button:hover { background: #7d5625; }
      button:disabled { background: #d1d5db; cursor: not-allowed; }
      #status {
        margin-top: 10px;
        font-size: 13px;
        text-align: center;
        min-height: 20px;
      }
      .success { color: #059669; }
      .error { color: #dc2626; }
      .info { color: #6b7280; }
      .divider {
        border-top: 1px solid #e5e7eb;
        margin: 14px 0;
      }
    </style>
  </head>
  <body>
    <h1>TLDR</h1>

    <button id="summarize">Summarize This Page</button>
    <div id="status"></div>

    <div class="divider"></div>

    <div class="section">
      <label for="workerUrl">Worker URL</label>
      <input type="text" id="workerUrl" placeholder="https://your-worker.workers.dev" />
    </div>
    <div class="section">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Paste your API key" />
    </div>
    <button id="save" style="background: #6b7280; font-size: 13px; padding: 8px;">Save Settings</button>

    <script src="popup.js"></script>
  </body>
</html>
