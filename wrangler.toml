name = "readwise-summary"
main = "src/worker.ts"
compatibility_date = "2024-12-30"

# Inbound email is received through Cloudflare Email Routing and handled by the
# Worker's exported email() function.
[[kv_namespaces]]
binding = "PROCESSED_EMAILS"
id = "166270223041423f90e276ecaa9b1d86"
preview_id = "5160d02695ca400f8c737c71516b0d7c"

# Cloudflare's local Email Worker tooling expects a send_email binding even if
# production delivery happens through Resend.
[[send_email]]
name = "EMAIL"
